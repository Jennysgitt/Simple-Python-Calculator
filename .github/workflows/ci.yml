name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest flake8 coverage
          pip install -e .

      - name: Lint code
        # Only scan the src and tests directories, ignore venv or hidden folders
        run: flake8 src/ tests/ 

      - name: Test and Run Coverage
        # This runs pytest through coverage to check how much code is tested
        run: |
          coverage run -m pytest tests/
          coverage report -m